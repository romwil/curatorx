name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint toolchain
        run: pip install ".[web,dev]"

      - name: ruff check
        run: ruff check .

      - name: mypy (scoped baseline)
        run: python -m mypy

  frontend:
    name: Frontend (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: eslint
        run: cd frontend && npm run lint

      # Non-blocking: existing source predates Prettier. Informational until a
      # dedicated formatting pass lands.
      - name: prettier --check
        run: cd frontend && npm run format
        continue-on-error: true
