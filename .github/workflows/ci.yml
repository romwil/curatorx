name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python package
        run: pip install ".[web]"

      - name: Install and build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Run tests
        run: python -m unittest discover -s tests -v
