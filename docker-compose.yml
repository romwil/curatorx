services:
  curatorx:
    build: .
    image: curatorx:latest
    container_name: curatorx
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8788}:8788"
    environment:
      DATA_DIR: /config
      PORT: "8788"
      PLEX_URL: ${PLEX_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      PLEX_MOVIE_SECTION: ${PLEX_MOVIE_SECTION:-}
      PLEX_TV_SECTION: ${PLEX_TV_SECTION:-}
      RADARR_URL: ${RADARR_URL:-}
      RADARR_API_KEY: ${RADARR_API_KEY:-}
      SONARR_URL: ${SONARR_URL:-}
      SONARR_API_KEY: ${SONARR_API_KEY:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TVDB_API_KEY: ${TVDB_API_KEY:-}
      FANART_API_KEY: ${FANART_API_KEY:-}
      TAUTULLI_URL: ${TAUTULLI_URL:-}
      TAUTULLI_API_KEY: ${TAUTULLI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai_compatible}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      CURATORX_LOG_LEVEL: ${CURATORX_LOG_LEVEL:-${LOG_LEVEL:-INFO}}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    volumes:
      - ${CONFIG_PATH:-./config}:/config
