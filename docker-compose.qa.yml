# CuratorX QA sidecar — multi-user auth ON, isolated volume, LAN-only.
#
# Purpose: browser / Playwright / Cursor MCP QA with real logins for
# owner / member / youth, plus public guest tour (/tour).
#
# NEVER point this at production /config. NEVER publish on a VIP / reverse-proxy
# hostname unless you intentionally want that surface tested.
#
# Stand up (automat / Unraid LAN example):
#   mkdir -p /mnt/user/appdata/curatorx-qa
#   cp .env.qa.example .env.qa   # fill passwords + CURATORX_SESSION_SECRET
#   # Write settings BEFORE first start (or use scripts/seed-qa-roles.sh --write-settings):
#   bash scripts/seed-qa-roles.sh --write-settings --config-dir /mnt/user/appdata/curatorx-qa
#   docker compose -f docker-compose.qa.yml --env-file .env.qa up -d
#   bash scripts/seed-qa-roles.sh --base-url http://10.10.1.202:8790 --env-file .env.qa
#
# See docs/TESTING.md → "QA sidecar — multi-role".

services:
  curatorx-qa:
    image: ${QA_IMAGE:-romwil/curatorx:latest}
    container_name: curatorx-qa
    restart: unless-stopped
    ports:
      # Host LAN port — default 8790 (prod/CA often uses 8788). Do not share VIP.
      - "${QA_HOST_PORT:-8790}:8788"
    environment:
      DATA_DIR: /config
      PORT: "8788"
      # Auth stays ON for this profile (multi_user + local login live in settings.json).
      CURATORX_GUEST_TOUR_ENABLED: ${CURATORX_GUEST_TOUR_ENABLED:-1}
      CURATORX_SESSION_SECRET: ${CURATORX_SESSION_SECRET:?Set CURATORX_SESSION_SECRET in .env.qa}
      CURATORX_LOG_LEVEL: ${CURATORX_LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai_compatible}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      # Optional live library wiring for richer QA (leave empty for auth-only smoke).
      PLEX_URL: ${PLEX_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      PLEX_MOVIE_SECTION: ${PLEX_MOVIE_SECTION:-}
      PLEX_TV_SECTION: ${PLEX_TV_SECTION:-}
      RADARR_URL: ${RADARR_URL:-}
      RADARR_API_KEY: ${RADARR_API_KEY:-}
      SONARR_URL: ${SONARR_URL:-}
      SONARR_API_KEY: ${SONARR_API_KEY:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      SEERR_URL: ${SEERR_URL:-}
      SEERR_API_KEY: ${SEERR_API_KEY:-}
    volumes:
      # Isolated QA config — never mount production appdata here.
      - ${QA_CONFIG_PATH:-./config-qa}:/config
